<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teleprompter Control</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0a;--panel:#141414;--panel-2:#1a1a1a;
  --text:#f0f0f0;--muted:#8a8a8a;--border:#2a2a2a;--accent:#ffc800;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,"Segoe UI",Roboto,sans-serif;}

/* ── OPENING ── */
#openingPanel{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:32px 24px;}
#openingPanel.hidden{display:none;}
.open-logo{font-size:18px;font-weight:700;letter-spacing:.04em;color:var(--muted);text-transform:uppercase;margin-bottom:4px;}
#qrBox{background:#fff;padding:12px;border-radius:10px;display:inline-block;}
#qrBox canvas,#qrBox img{display:block;}
#hostCode{font-family:"SF Mono","Courier New",monospace;font-size:44px;letter-spacing:.2em;color:var(--accent);border:2px solid var(--accent);border-radius:8px;padding:12px 20px;text-align:center;}
#connectionStatus{color:var(--muted);font-size:13px;min-height:18px;}
#newCodeBtn{background:none;border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:7px;font-size:13px;cursor:pointer;}
#newCodeBtn:hover{border-color:var(--accent);color:var(--accent);}
.open-divider{color:var(--muted);font-size:12px;letter-spacing:.05em;margin:4px 0;}
.open-actions{display:flex;gap:12px;}
.open-btn{padding:12px 28px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;}
.open-btn.primary{background:var(--accent);color:#000;}
.open-btn.secondary{background:var(--panel-2);color:var(--text);border:1px solid var(--border);}

/* ── QR MODAL ── */
#qrModal{display:none;position:fixed;inset:0;z-index:99;background:rgba(0,0,0,.82);align-items:center;justify-content:center;}
.qr-inner{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:28px 24px;text-align:center;display:flex;flex-direction:column;gap:14px;min-width:260px;}
.qr-title{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600;}
#qrModalCode{font-family:"SF Mono","Courier New",monospace;font-size:40px;letter-spacing:.2em;color:var(--accent);border:2px solid var(--accent);border-radius:8px;padding:12px 18px;}
#qrModalCanvas img,#qrModalCanvas canvas{display:block;margin:0 auto;}
.qr-close{background:none;border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;}

/* ── RECONNECT BANNER ── */
#reconnectBanner{display:none;position:absolute;top:36px;left:0;right:0;z-index:20;background:rgba(10,10,10,.97);border-bottom:1px solid var(--accent);padding:8px 18px;align-items:center;gap:12px;justify-content:center;}
#reconnectBanner.visible{display:flex;}
#reconnectBanner span{font-size:13px;color:var(--muted);}
.code-inline{font-family:"SF Mono","Courier New",monospace;color:var(--accent);font-size:14px;letter-spacing:.1em;}
#dismissBanner{background:none;border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:5px;font-size:12px;cursor:pointer;margin-left:auto;}

/* ── TAB BAR ── */
#tabBar{display:none;height:36px;background:var(--panel);border-bottom:1px solid var(--border);align-items:stretch;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
#tabBar::-webkit-scrollbar{display:none;}
#tabBar.visible{display:flex;}
.tab{display:flex;align-items:center;gap:4px;padding:0 8px 0 12px;white-space:nowrap;font-size:13px;color:var(--muted);border-right:1px solid var(--border);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;flex-shrink:0;max-width:240px;}
.tab.active{color:var(--text);border-bottom-color:var(--accent);}
.tab:hover:not(.active){color:var(--text);}
.tab-name{overflow:hidden;text-overflow:ellipsis;max-width:130px;}
.tab-rename-btn,.tab-close{background:none;border:none;cursor:pointer;padding:2px 3px;font-size:13px;color:var(--muted);line-height:1;flex-shrink:0;}
.tab-rename-btn:hover{color:var(--accent);}
.tab-close:hover{color:#e55;}
#addTabBtn{padding:0 14px;color:var(--muted);font-size:18px;cursor:pointer;background:none;border:none;flex-shrink:0;border-right:1px solid var(--border);}
#addTabBtn:hover{color:var(--accent);}
.tab-session-area{display:flex;align-items:center;gap:6px;margin-left:auto;padding:0 10px;border-left:1px solid var(--border);}
.tab-session-btn{background:var(--panel-2);color:var(--text);border:1px solid var(--border);height:26px;padding:0 12px;border-radius:5px;font-size:12px;cursor:pointer;white-space:nowrap;}
.tab-session-btn:hover{border-color:var(--accent);color:var(--accent);}
.tab-rename-input{background:var(--panel);border:1px solid var(--accent);color:var(--text);font-size:13px;padding:1px 6px;border-radius:4px;outline:none;width:120px;}
#fileInput{display:none;}

/* ── MAIN PANEL ── */
#mainPanel{display:none;position:relative;}
#mainPanel.visible{display:flex;flex-direction:row;height:calc(100vh - 36px);}
#editorPane{flex:0 0 56%;min-width:180px;overflow:hidden;display:flex;flex-direction:column;border-right:2px solid var(--accent);}
#dragHandle{width:5px;background:var(--border);cursor:col-resize;flex-shrink:0;transition:background .15s;z-index:5;}
#dragHandle:hover,#dragHandle.dragging{background:var(--accent);}
#sidePane{flex:1;min-width:180px;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}

/* ── TOOLBAR ── */
#toolbar{display:flex;align-items:center;gap:4px;padding:5px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.tb-right{margin-left:auto;display:flex;gap:4px;align-items:center;}
#saveStatus{font-size:11px;color:var(--muted);margin-left:8px;white-space:nowrap;}
.tb-btn{background:var(--panel-2);color:var(--text);border:1px solid var(--border);border-radius:6px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;padding:0 10px;white-space:nowrap;}
.tb-btn.icon{width:28px;padding:0;}
.tb-btn.icon svg{width:13px;height:13px;}
.tb-btn:hover{border-color:var(--accent);color:var(--accent);}
.tb-btn.mode{padding:0 16px;font-size:13px;}
.tb-btn.mode.active{border-color:var(--accent);color:var(--accent);}
.tb-sep{width:1px;background:var(--border);height:20px;margin:0 3px;flex-shrink:0;}

/* ── EDITOR SCROLLBAR (left, editor-nav only, no prompter effect) ── */
#editorScrollbar{width:12px;background:var(--panel);border-right:1px solid var(--border);position:relative;flex-shrink:0;cursor:pointer;user-select:none;}
#editorScrollThumb{position:absolute;left:2px;right:2px;min-height:20px;background:var(--muted);border-radius:4px;opacity:.4;cursor:grab;transition:opacity .15s;}
#editorScrollThumb:hover{opacity:.7;}
#editorScrollThumb:active{cursor:grabbing;opacity:.9;}
/* Hide native scrollbars — left scrollbar replaces them */
#textArea{scrollbar-width:none;}
#textArea::-webkit-scrollbar{display:none;}
#directorView{scrollbar-width:none;}
#directorView::-webkit-scrollbar{display:none;}

/* ── EDITOR AREA ── */
#editorArea{flex:1;display:flex;flex-direction:row;min-height:0;}
#editorStack{flex:1;position:relative;min-height:0;}
#highlightLayer,#textArea{position:absolute;inset:0;padding:16px;font-size:16px;line-height:1.6;font-family:-apple-system,"Segoe UI",Roboto,sans-serif;white-space:pre-wrap;word-wrap:break-word;overflow-y:auto;box-sizing:border-box;}
#highlightLayer{color:transparent;background:var(--panel);border:1px solid transparent;pointer-events:none;z-index:1;}
#textArea{background:transparent;color:var(--text);border:1px solid transparent;resize:none;outline:none;z-index:2;caret-color:var(--accent);}
#textArea:focus{border-color:var(--accent);}
.highlight-span{background:rgba(255,200,0,.75);border-radius:2px;}
#scrubberTrack{width:14px;background:var(--panel);border-left:1px solid var(--border);position:relative;flex-shrink:0;cursor:pointer;}
#scrubberThumb{position:absolute;left:2px;right:2px;min-height:24px;background:var(--accent);border-radius:5px;opacity:.85;cursor:grab;}
#scrubberThumb:active{cursor:grabbing;opacity:1;}

/* ── DIRECTOR VIEW ── */
#directorView{display:none;flex:1;overflow-y:auto;padding:8px 12px;flex-direction:column;background:var(--panel);}
#directorView.active{display:flex;}
.dv-section{padding:6px 0;border-bottom:1px solid var(--border);}
.dv-section:last-child{border-bottom:none;}
.dv-sentence-row{
  display:grid;grid-template-columns:22px 1fr;
  padding:3px 60px 3px 4px;/* right padding reserves space for abs button */
  border-radius:5px;position:relative;
}
.dv-sentence-row:hover{background:var(--panel-2);}
.dv-check{width:14px;height:14px;margin-top:4px;accent-color:var(--accent);cursor:pointer;visibility:hidden;grid-row:1;}
.section-first .dv-check{visibility:visible;}
.dv-sent-text{font-size:14px;line-height:1.6;color:var(--text);cursor:pointer;display:block;grid-column:2;}
.dv-hl{background:rgba(255,200,0,.75);border-radius:2px;color:inherit;}
.dv-section.done .dv-sent-text{color:var(--muted);text-decoration:line-through;}
/* Add note: absolutely positioned so it never shifts layout */
.dv-add-note{
  position:absolute;right:6px;top:5px;
  display:none;background:none;border:none;
  color:var(--muted);font-size:11px;cursor:pointer;white-space:nowrap;
}
.dv-sentence-row:hover .dv-add-note{display:block;}
/* Existing comment and input: span full width below sentence, in grid col 2 */
.dv-existing-comment{
  grid-column:2;font-size:12px;color:var(--muted);background:var(--panel-2);
  border-radius:5px;padding:5px 9px;margin-top:3px;border-left:2px solid var(--accent);
  line-height:1.4;cursor:pointer;
}
.dv-comment-input{
  grid-column:2;width:100%;font-size:12px;color:var(--text);background:var(--panel-2);
  border:1px solid var(--accent);border-radius:5px;padding:5px 9px;
  resize:none;outline:none;font-family:inherit;line-height:1.5;margin-top:3px;
}

/* ── SIDE PANE ── */
.label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600;}
#monitor{background:#000;border:1px solid var(--border);border-radius:8px;overflow:hidden;position:relative;margin:0 auto;}
#previewBox{width:100%;height:100%;overflow:hidden;position:relative;container-type:size;cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none;}
#previewBox.dragging{cursor:grabbing;}
#previewText{color:#fff;padding:60cqh 6cqw;white-space:pre-wrap;word-wrap:break-word;line-height:1.5;user-select:none;}
.divider{border:none;border-top:1px solid var(--border);margin:2px 0;}
.btn{background:var(--panel-2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:9px 14px;font-size:14px;cursor:pointer;flex:1;display:flex;align-items:center;justify-content:center;}
.btn.active{border-color:var(--accent);color:var(--accent);}
.btn-row{display:flex;gap:8px;align-items:stretch;}
.icon-btn{flex:0 0 42px;width:42px;height:42px;padding:0;border-radius:12px;}
.icon-btn svg{width:20px;height:20px;}
.slider-row{display:flex;flex-direction:column;gap:5px;}
.ctrl-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.val{font-size:13px;color:var(--accent);font-family:"SF Mono","Courier New",monospace;}
.slider-btns{display:flex;align-items:center;gap:6px;}
.slider-btns input{flex:1;accent-color:var(--accent);}
.step-btn{background:var(--panel-2);color:var(--text);border:1px solid var(--border);border-radius:6px;width:30px;height:30px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;user-select:none;}
.step-btn:active{border-color:var(--accent);color:var(--accent);}
.select-input{background:var(--panel-2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:9px;font-size:14px;outline:none;width:100%;}
.select-input:focus{border-color:var(--accent);}
#statusBar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
#sideStatus{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600;}
#persistentCode{font-family:"SF Mono","Courier New",monospace;font-size:18px;color:var(--accent);border:1px solid var(--border);border-radius:6px;padding:5px 12px;letter-spacing:.12em;cursor:pointer;transition:border-color .15s;}
#persistentCode:hover{border-color:var(--accent);}

/* ── TOAST ── */
#restoreToast{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:98;background:var(--panel);border:1px solid var(--accent);border-radius:10px;padding:12px 16px;align-items:center;gap:10px;box-shadow:0 4px 24px rgba(0,0,0,.6);white-space:nowrap;}
#restoreToast.visible{display:flex;}
.toast-btn{background:var(--accent);color:#000;border:none;padding:7px 14px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;}
.toast-btn.sec{background:none;border:1px solid var(--border);color:var(--muted);font-weight:400;}
</style>
</head>
<body>

<!-- ── OPENING ── -->
<div id="openingPanel">
  <div class="open-logo">Teleprompter</div>
  <div id="qrBox"><div id="qrCanvas"></div></div>
  <div id="hostCode">------</div>
  <div id="connectionStatus">Generating code…</div>
  <button id="newCodeBtn">New code</button>
  <div class="open-divider">— start a session —</div>
  <div class="open-actions">
    <button class="open-btn primary" id="newProjectBtn">New project</button>
    <button class="open-btn secondary" id="loadProjectBtn">Load project</button>
    <input type="file" id="fileInput" accept=".json,.tpsession">
  </div>
</div>

<!-- ── QR MODAL ── -->
<div id="qrModal">
  <div class="qr-inner">
    <div class="qr-title">Connect prompter</div>
    <div id="qrModalCanvas"></div>
    <div id="qrModalCode"></div>
    <button class="qr-close" id="closeQrModal">Close</button>
  </div>
</div>

<!-- ── TAB BAR ── -->
<div id="tabBar">
  <button id="addTabBtn">+</button>
  <div class="tab-session-area">
    <button class="tab-session-btn" id="saveSessionBtn">Save session</button>
    <button class="tab-session-btn" id="loadSessionBtn">Load session</button>
  </div>
</div>

<!-- ── MAIN PANEL ── -->
<div id="mainPanel">
  <div id="reconnectBanner">
    <span>Prompter disconnected — reconnect with</span>
    <span id="bannerCode" class="code-inline">------</span>
    <button id="dismissBanner">Dismiss</button>
  </div>

  <div id="editorPane">
    <div id="toolbar">
      <button class="tb-btn mode active" id="editorModeBtn">Edit</button>
      <button class="tb-btn mode" id="directorModeBtn">Direct</button>
      <div class="tb-sep"></div>
      <button class="tb-btn icon" id="undoBtn" title="Undo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M3 13C5.5 7.5 12 5 17 8.5s6 10 2 14"/></svg>
      </button>
      <button class="tb-btn icon" id="redoBtn" title="Redo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M21 13C18.5 7.5 12 5 7 8.5S1 18.5 5 22.5"/></svg>
      </button>
      <div class="tb-right">
        <button class="tb-btn" id="copyBtn">Copy</button>
        <button class="tb-btn" id="exportBtn">Export</button>
        <span id="saveStatus"></span>
      </div>
    </div>

    <div id="editorArea">
      <div id="editorScrollbar"><div id="editorScrollThumb"></div></div>
      <div id="editorStack">
        <div id="highlightLayer" aria-hidden="true"></div>
        <textarea id="textArea" spellcheck="false" placeholder="Type the script here…"></textarea>
      </div>
      <div id="directorView"></div>
      <div id="scrubberTrack"><div id="scrubberThumb"></div></div>
    </div>
  </div>

  <div id="dragHandle"></div>

  <div id="sidePane">
    <div class="label">Live preview</div>
    <div id="monitor">
      <div id="previewBox"><div id="previewText"></div></div>
    </div>
    <hr class="divider">
    <div class="btn-row">
      <button class="btn" id="playBtn">Play</button>
      <button class="btn" id="resetBtn">Restart</button>
      <button class="btn icon-btn" id="mirrorHBtn" title="Flip H">
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="11" y="2" width="2" height="20" opacity=".4"/><path d="M3 12l5-4.5v9z"/><path d="M21 12l-5-4.5v9z"/></svg>
      </button>
      <button class="btn icon-btn" id="mirrorVBtn" title="Flip V">
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="11" width="20" height="2" opacity=".4"/><path d="M12 3l4.5 5h-9z"/><path d="M12 21l4.5-5h-9z"/></svg>
      </button>
    </div>
    <div class="slider-row">
      <div class="ctrl-row"><span class="label">Font size</span><span class="val" id="fontSizeValue">48px</span></div>
      <div class="slider-btns">
        <button class="step-btn" id="fontDecBtn">−</button>
        <input type="range" id="fontSizeSlider" min="20" max="200" step="1">
        <button class="step-btn" id="fontIncBtn">+</button>
      </div>
    </div>
    <div class="slider-row">
      <div class="ctrl-row"><span class="label">Scroll speed</span><span class="val" id="speedValue">50</span></div>
      <div class="slider-btns">
        <button class="step-btn" id="speedDecBtn">−</button>
        <input type="range" id="speedSlider" min="0" max="400" step="1">
        <button class="step-btn" id="speedIncBtn">+</button>
      </div>
    </div>
    <div class="slider-row">
      <div class="ctrl-row"><span class="label">Font</span></div>
      <select id="fontFamilySelect" class="select-input"></select>
    </div>
    <hr class="divider">
    <div id="statusBar">
      <div id="sideStatus">DISCONNECTED</div>
      <span id="peerStatus" title="Signaling server status" style="font-size:9px;color:var(--muted);">●</span>
      <span id="persistentCode" title="Click to show QR">------</span>
    </div>
  </div>
</div>

<div id="restoreToast">
  <div>
    <div style="font-size:13px;">Restore autosaved script?</div>
    <div id="savedTime" style="font-size:11px;color:var(--muted);margin-top:2px;"></div>
  </div>
  <button class="toast-btn" id="restoreBtn">Restore</button>
  <button class="toast-btn sec" id="dismissRestoreBtn">Discard</button>
</div>

<script>
// ── HELPERS ──────────────────────────────────────────────
function uid(){return Math.random().toString(36).slice(2,10);}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
const FONTS={
  verdana:{label:'Verdana',stack:'Verdana,Geneva,sans-serif'},
  opensans:{label:'Open Sans',stack:"'Open Sans',sans-serif"},
  atkinson:{label:'Atkinson Hyperlegible',stack:"'Atkinson Hyperlegible',sans-serif"},
  mono:{label:'Monospace',stack:"'Courier New',monospace"}
};
const SESSION_KEY='tp_session', AUTOSAVE_KEY='tp_autosave';
const TUTORIAL=`Welcome to Teleprompter Control.

This is Script 1 — rename it by clicking ✎ in the tab above. Add more scripts with the + button.

GETTING STARTED
Open prompter.html on your phone and enter the pairing code shown in the bottom-right corner to link the two. Click the code to reveal a QR code for quick pairing.

EDITOR MODE
Type your script here. It syncs live to the phone as you type. The yellow highlight shows exactly which words are currently visible on the phone screen. Use the scrubber bar on the right or scroll over the editor with the mouse wheel to navigate.

DIRECTOR MODE
See your script as individual sentences. Click any sentence to jump the prompter there. The yellow highlight tracks what is visible. Hover a sentence to reveal + Add note on the right. Notes are saved with the session and included in exports. Check the box next to a section's first sentence to mark it as done.

CONTROLS (right panel)
Play / Pause, Restart, Flip H / V. Font size and scroll speed sliders. Press Space to play/pause. Arrow keys jump between sentences when the script editor is not focused.

BLUETOOTH REMOTE (phone)
Tap ⚙ on the prompter to customise shortcuts. Defaults: 1 or G = play/pause, F = speed up, V = speed down, hold arrows = continuous scroll, T = jump to top.

SESSIONS
Save your full session (all scripts, notes, settings) as a .tpsession file and reload it on shoot day.`;

// ── DOM REFS ──────────────────────────────────────────────
const $ = id => document.getElementById(id);
const openingPanel=$('openingPanel'), newProjectBtn=$('newProjectBtn'), loadProjectBtn=$('loadProjectBtn');
const hostCode=$('hostCode'), connectionStatus=$('connectionStatus'), newCodeBtn=$('newCodeBtn'), qrCanvas=$('qrCanvas');
const fileInput=$('fileInput');
const qrModal=$('qrModal'), qrModalCanvas=$('qrModalCanvas'), qrModalCode=$('qrModalCode'), closeQrModal=$('closeQrModal');
const mainPanel=$('mainPanel'), tabBar=$('tabBar');
const reconnectBanner=$('reconnectBanner'), bannerCode=$('bannerCode'), dismissBanner=$('dismissBanner');
const persistentCode=$('persistentCode');
const restoreToast=$('restoreToast'), savedTimeEl=$('savedTime'), restoreBtn=$('restoreBtn'), dismissRestoreBtn=$('dismissRestoreBtn');
const addTabBtn=$('addTabBtn'), saveSessionBtn=$('saveSessionBtn'), loadSessionBtn=$('loadSessionBtn');
const editorModeBtn=$('editorModeBtn'), directorModeBtn=$('directorModeBtn'), saveStatus=$('saveStatus');
const highlightLayer=$('highlightLayer'), textArea=$('textArea');
const undoBtn=$('undoBtn'), redoBtn=$('redoBtn'), copyBtn=$('copyBtn'), exportBtn=$('exportBtn');
const editorScrollbar=$('editorScrollbar'), editorScrollThumb=$('editorScrollThumb');
const editorStack=$('editorStack'), directorView=$('directorView');
const scrubberTrack=$('scrubberTrack'), scrubberThumb=$('scrubberThumb');
const dragHandle=$('dragHandle'), sidePane=$('sidePane');

// ── SESSION ───────────────────────────────────────────────
function defaultSession(tutorial=false){
  const id=uid();return{version:1,scripts:[{id,name:'Script 1',text:tutorial?TUTORIAL:''}],activeId:id,notes:{}};
}
function getActiveScript(){return session.scripts.find(s=>s.id===session.activeId)||session.scripts[0];}
function getNotesFor(id){return session.notes[id]||(session.notes[id]={});}
function persistSession(){
  getActiveScript().text=textArea.value;
  try{localStorage.setItem(SESSION_KEY,JSON.stringify(session));}catch(e){}
}
function autosave(){
  try{localStorage.setItem(AUTOSAVE_KEY,JSON.stringify({text:textArea.value,savedAt:Date.now()}));}catch(e){}
  saveStatus.textContent='Saved';setTimeout(()=>{saveStatus.textContent='';},2000);
}
let session=(()=>{try{const r=localStorage.getItem(SESSION_KEY);if(r){const s=JSON.parse(r);if(s&&s.scripts)return s;}}catch(e){}return defaultSession(true);})();

// ── PROMPTER STATE ────────────────────────────────────────
let state={text:'',fontSize:48,fontFamily:'opensans',scrollSpeed:50,mirroredH:false,mirroredV:false,playState:'paused'};
function syncScript(){state.text=getActiveScript().text;}
syncScript();

// ── MODE ──────────────────────────────────────────────────
let uiMode='editor';
function setMode(m){
  uiMode=m;const dir=m==='director';
  editorModeBtn.classList.toggle('active',!dir);
  directorModeBtn.classList.toggle('active',dir);
  editorStack.style.display=dir?'none':'';
  directorView.classList.toggle('active',dir);
  if(dir)renderDirectorView();else renderHighlight();
  requestAnimationFrame(updateEditorScroll);
}
editorModeBtn.onclick=()=>setMode('editor');
directorModeBtn.onclick=()=>setMode('director');

// ── PARSING ───────────────────────────────────────────────
function parseSentences(text,base){
  const r=[],re=/[^.!?\n]+(?:[.!?]+\s*)?/g;let m;
  while((m=re.exec(text))!==null){const t=m[0].trim();if(t.length>1)r.push({text:t,offset:base+m.index,len:m[0].length});}
  if(!r.length&&text.trim())r.push({text:text.trim(),offset:base,len:text.length});
  return r;
}
function getParagraphs(text){
  const r=[];let off=0;
  for(const part of text.split(/(\n{2,})/)){
    if(/^\n+$/.test(part)){off+=part.length;continue;}
    const t=part.trim();if(t)r.push({text:t,offset:off,sentences:parseSentences(t,off)});
    off+=part.length;
  }
  return r;
}
let sentenceStarts=[0],sentenceIdx=0;
function buildSentenceStarts(text){
  const s=[0];const re=/[.!?]\s+|\n{2,}/g;let m;
  while((m=re.exec(text))!==null){const i=m.index+m[0].length;if(i<text.length&&/\S/.test(text[i]))s.push(i);}
  return s;
}
function jumpToSentence(idx){
  if(!sentenceStarts.length)return;
  idx=Math.max(0,Math.min(idx,sentenceStarts.length-1));
  sentenceIdx=idx;
  const pct=scrollPctFromChar(sentenceStarts[idx]);
  scrollPct=pct;sendUpdate('seek',pct);correctPreview(pct);renderHighlight();updateScrubber();
  const total=state.text.length||1;
  textArea.scrollTop=(sentenceStarts[idx]/total)*textArea.scrollHeight;
  highlightLayer.scrollTop=textArea.scrollTop;
}

// ── DIRECTOR VIEW ─────────────────────────────────────────
let dvDebounce=null;
function renderDirectorView(){
  const scr=getActiveScript(),notes=getNotesFor(scr.id),secs=getParagraphs(scr.text);
  directorView.innerHTML='';
  if(!secs.length){directorView.innerHTML='<div style="color:var(--muted);font-size:14px;padding:20px;text-align:center;">Switch to Editor to write the script.</div>';return;}
  secs.forEach((sec,sIdx)=>{
    const sNote=notes[`s_${sIdx}`]||{};
    const div=document.createElement('div');
    div.className='dv-section'+(sNote.checked?' done':'');
    const sentsEl=document.createElement('div');
    sec.sentences.forEach((sent,sentIdx)=>{
      const key=`${sIdx}_${sentIdx}`;
      const sn=notes[`sent_${key}`]||{};
      const row=document.createElement('div');
      row.className='dv-sentence-row'+(sentIdx===0?' section-first':'');
      row.dataset.start=sent.offset;row.dataset.end=sent.offset+sent.len;row.dataset.raw=sent.text;
      // Checkbox (only visible on first row via CSS)
      const cb=document.createElement('input');
      cb.type='checkbox';cb.className='dv-check';cb.checked=!!sNote.checked;
      cb.addEventListener('change',e=>{
        e.stopPropagation();
        notes[`s_${sIdx}`]={...(notes[`s_${sIdx}`]||{}),checked:cb.checked};
        persistSession();div.classList.toggle('done',cb.checked);
        div.querySelectorAll('.dv-check').forEach(c=>c.checked=cb.checked);
      });
      row.appendChild(cb);
      // Sentence text
      const textEl=document.createElement('span');
      textEl.className='dv-sent-text';textEl.textContent=sent.text;
      textEl.onclick=()=>{
        const pct=scrollPctFromChar(sent.offset);
        scrollPct=pct;sendUpdate('seek',pct);correctPreview(pct);renderHighlight();updateScrubber();
      };
      row.appendChild(textEl);
      // + Add note (abs positioned, no layout shift)
      const addBtn=document.createElement('button');
      addBtn.className='dv-add-note';addBtn.textContent='+ Add note';
      addBtn.onclick=e=>{e.stopPropagation();openComment(row,key,notes);};
      row.appendChild(addBtn);
      // Existing comment
      if(sn.text){
        const bubble=document.createElement('div');
        bubble.className='dv-existing-comment';bubble.textContent=sn.text;
        bubble.onclick=e=>{e.stopPropagation();openComment(row,key,notes);};
        row.appendChild(bubble);
      }
      sentsEl.appendChild(row);
    });
    div.appendChild(sentsEl);directorView.appendChild(div);
  });
  highlightDirector();
}

function openComment(rowEl,key,notes){
  if(rowEl.querySelector('.dv-comment-input'))return;
  const sn=notes[`sent_${key}`]||{};
  const inp=document.createElement('textarea');
  inp.className='dv-comment-input';inp.value=sn.text||'';
  inp.placeholder='Write a note for this sentence…';inp.rows=2;
  const bubble=rowEl.querySelector('.dv-existing-comment');
  if(bubble)bubble.style.display='none';
  rowEl.querySelector('.dv-add-note').style.display='none';
  rowEl.appendChild(inp);inp.focus();
  inp.onblur=()=>{
    const val=inp.value.trim();notes[`sent_${key}`]={...(notes[`sent_${key}`]||{}),text:val};
    persistSession();renderDirectorView();
  };
  inp.onkeydown=e=>{if(e.key==='Escape'){inp.onblur=null;inp.remove();if(bubble)bubble.style.display='';rowEl.querySelector('.dv-add-note').style.display='';}};
}

function highlightDirector(){
  if(uiMode!=='director')return;
  const{startChar,endChar}=getHighlightRange();
  let first=null;
  directorView.querySelectorAll('.dv-sentence-row').forEach(row=>{
    const s=parseInt(row.dataset.start),e=parseInt(row.dataset.end),raw=row.dataset.raw||'';
    const textEl=row.querySelector('.dv-sent-text');
    if(e<=startChar||s>=endChar){textEl.textContent=raw;}
    else{
      const vs=Math.max(0,startChar-s),ve=Math.min(raw.length,endChar-s);
      textEl.innerHTML=escHtml(raw.slice(0,vs))+(ve>vs?'<mark class="dv-hl">'+escHtml(raw.slice(vs,ve))+'</mark>':'')+escHtml(raw.slice(ve));
      if(!first)first=row;
    }
  });
  if(first){clearTimeout(dvDebounce);dvDebounce=setTimeout(()=>{first.scrollIntoView({block:'nearest',behavior:'smooth'});requestAnimationFrame(updateEditorScroll);},200);}
}

function exportWithNotes(){
  const scr=getActiveScript(),notes=getNotesFor(scr.id);
  let md=scr.text;
  const secs=getParagraphs(scr.text);
  const hasNotes=Object.keys(notes).some(k=>k.startsWith('sent_')&&notes[k].text);
  const hasDone=Object.keys(notes).some(k=>k.startsWith('s_')&&notes[k].checked);
  if(hasNotes||hasDone){
    md+='\n\n---\n## Director\'s Notes\n';
    secs.forEach((sec,si)=>{
      const sn=notes[`s_${si}`]||{};
      md+=`\n**Section ${si+1}**${sn.checked?' ✓':''}\n`;
      sec.sentences.forEach((sent,sentI)=>{
        const n=(notes[`sent_${si}_${sentI}`]||{}).text;
        if(n)md+=`  > "${sent.text.slice(0,50)}${sent.text.length>50?'…':''}" — ${n}\n`;
      });
    });
  }
  const blob=new Blob([md],{type:'text/markdown'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=(scr.name||'script')+'.md';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

// ── TABS ──────────────────────────────────────────────────
function renderTabs(){
  document.querySelectorAll('.tab').forEach(t=>t.remove());
  session.scripts.forEach(scr=>{
    const tab=document.createElement('button');
    tab.className='tab'+(scr.id===session.activeId?' active':'');
    const nameSpan=document.createElement('span');nameSpan.className='tab-name';nameSpan.textContent=scr.name;
    const renameBtn=document.createElement('button');
    renameBtn.className='tab-rename-btn';renameBtn.textContent='✎';renameBtn.title='Rename';
    renameBtn.addEventListener('click',e=>{e.stopPropagation();doRename(tab,nameSpan,scr);});
    tab.appendChild(nameSpan);tab.appendChild(renameBtn);
    if(session.scripts.length>1){
      const x=document.createElement('button');x.className='tab-close';x.textContent='×';x.title='Delete';
      x.addEventListener('click',e=>{e.stopPropagation();deleteScript(scr.id);});
      tab.appendChild(x);
    }
    tab.addEventListener('click',()=>{if(!tab.querySelector('.tab-rename-input'))switchTo(scr.id);});
    tabBar.insertBefore(tab,addTabBtn);
  });
}
function doRename(tab,nameSpan,scr){
  if(tab.querySelector('.tab-rename-input'))return;
  const inp=document.createElement('input');inp.className='tab-rename-input';inp.value=scr.name;
  nameSpan.style.display='none';tab.insertBefore(inp,nameSpan);inp.focus();inp.select();
  let done=false;
  const finish=()=>{if(done)return;done=true;const v=inp.value.trim()||scr.name;scr.name=v;inp.remove();nameSpan.style.display='';nameSpan.textContent=v;persistSession();renderTabs();};
  inp.onblur=finish;
  inp.onkeydown=e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){done=true;inp.remove();nameSpan.style.display='';}};
}
function switchTo(id){
  getActiveScript().text=textArea.value;session.activeId=id;persistSession();syncScript();
  textArea.value=state.text;sentenceStarts=buildSentenceStarts(state.text);sentenceIdx=0;
  renderTabs();renderControls();sendUpdate('text',state.text);
}
function addScript(){
  getActiveScript().text=textArea.value;const id=uid();
  session.scripts.push({id,name:'Script '+(session.scripts.length+1),text:''});switchTo(id);
}
function deleteScript(id){
  const scr=session.scripts.find(s=>s.id===id);if(!scr)return;
  if(!confirm('Delete "'+scr.name+'"? This cannot be undone.'))return;
  session.scripts=session.scripts.filter(s=>s.id!==id);
  if(session.activeId===id)session.activeId=session.scripts[0].id;
  persistSession();syncScript();textArea.value=state.text;renderTabs();renderControls();sendUpdate('text',state.text);
}
addTabBtn.onclick=addScript;

// ── SESSION SAVE / LOAD ───────────────────────────────────
saveSessionBtn.onclick=()=>{
  persistSession();
  const data={_type:'teleprompter-session',_version:1,...session};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='teleprompter-session.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
};
function doLoadFile(file){
  const reader=new FileReader();
  reader.onload=ev=>{
    try{const loaded=JSON.parse(ev.target.result);if(!loaded.scripts)throw 0;
      session=loaded;if(!session.notes)session.notes={};persistSession();syncScript();
      textArea.value=state.text;sentenceStarts=buildSentenceStarts(state.text);sentenceIdx=0;
      renderTabs();renderControls();sendUpdate('text',state.text);
    }catch(e){alert('Could not load session file.');}
  };reader.readAsText(file);fileInput.value='';
}
fileInput.onchange=e=>{
  if(!e.target.files[0])return;
  doLoadFile(e.target.files[0]);
  if(!openingPanel.classList.contains('hidden'))enterMainPanel();
};
loadSessionBtn.onclick=()=>fileInput.click();

// ── AUTOSAVE / RESTORE ────────────────────────────────────
function checkRestore(){
  try{const r=localStorage.getItem(AUTOSAVE_KEY);if(!r)return;const s=JSON.parse(r);
    if(!s||!s.text||s.text===state.text)return;
    const d=new Date(s.savedAt);savedTimeEl.textContent='Saved '+d.toLocaleDateString()+' '+d.toLocaleTimeString();
    restoreToast.classList.add('visible');
  }catch(e){}
}
restoreBtn.onclick=()=>{try{const s=JSON.parse(localStorage.getItem(AUTOSAVE_KEY));if(s){textArea.value=s.text;sendUpdate('text',s.text);}}catch(e){}restoreToast.classList.remove('visible');};
dismissRestoreBtn.onclick=()=>restoreToast.classList.remove('visible');

// ── RENDERING ─────────────────────────────────────────────
function renderControls(){
  if(document.activeElement!==textArea)textArea.value=state.text;
  if(document.activeElement!==fontSizeSlider)fontSizeSlider.value=state.fontSize;
  fontSizeValue.textContent=state.fontSize+'px';
  if(document.activeElement!==speedSlider)speedSlider.value=state.scrollSpeed;
  speedValue.textContent=state.scrollSpeed;
  if(document.activeElement!==fontFamilySelect)fontFamilySelect.value=state.fontFamily;
  fontFamilySelect.style.fontFamily=(FONTS[state.fontFamily]||FONTS.opensans).stack;
  mirrorHBtn.classList.toggle('active',state.mirroredH);
  mirrorVBtn.classList.toggle('active',state.mirroredV);
  playBtn.textContent=state.playState==='playing'?'Pause':'Play';
  playBtn.classList.toggle('active',state.playState==='playing');
  previewText.textContent=state.text;
  previewText.style.fontFamily=(FONTS[state.fontFamily]||FONTS.opensans).stack;
  updateMonitorScale();renderHighlight();updateScrubber();

// ── DRAGGABLE SPLIT ───────────────────────────────────────
let draggingH=false,hStartX=0,hStartW=0;
dragHandle.addEventListener('pointerdown',e=>{
  draggingH=true;hStartX=e.clientX;hStartW=$('editorPane').getBoundingClientRect().width;
  dragHandle.classList.add('dragging');dragHandle.setPointerCapture(e.pointerId);
});
dragHandle.addEventListener('pointermove',e=>{
  if(!draggingH)return;
  const w=Math.max(200,Math.min(hStartW+(e.clientX-hStartX),window.innerWidth-220));
  $('editorPane').style.flex=`0 0 ${w}px`;updateMonitorScale();
});
dragHandle.addEventListener('pointerup',()=>{draggingH=false;dragHandle.classList.remove('dragging');});

// ── PREVIEW & SCROLL ──────────────────────────────────────
let scrollPct=0,phone={w:390,h:844},previewScale=1;
let previewPos=0,prevLast=null,draggingPreview=false,draggingScrubber=false,dragScrubOff=0;
let peer=null,conn=null,peerCode=generateCode();

function generateCode(){return Math.floor(100000+Math.random()*900000).toString();}
function updateMonitorScale(){
  const cs=getComputedStyle(sidePane);
  const avail=sidePane.clientWidth-parseFloat(cs.paddingLeft)-parseFloat(cs.paddingRight);
  const ratio=phone.w/phone.h;let h=Math.min(260,avail/ratio),w=h*ratio;
  if(w>avail){w=avail;h=w/ratio;}
  monitor.style.width=w+'px';monitor.style.height=h+'px';
  previewScale=phone.w>0?w/phone.w:1;
  previewText.style.fontSize=(state.fontSize*previewScale)+'px';
}
function previewTick(ts){
  if(state.playState==='playing'&&!draggingPreview){
    if(prevLast!==null){const dt=(ts-prevLast)/1000;const max=Math.max(0,previewText.scrollHeight-previewBox.clientHeight);previewPos=Math.max(0,Math.min(previewPos+state.scrollSpeed*previewScale*dt,max));previewBox.scrollTop=previewPos;}
    prevLast=ts;
  }else{prevLast=null;}
  requestAnimationFrame(previewTick);
}
requestAnimationFrame(previewTick);
function correctPreview(pct){
  const max=Math.max(0,previewText.scrollHeight-previewBox.clientHeight);
  const target=pct*max,diff=target-previewPos;
  previewPos=Math.abs(diff)>40?target:previewPos+diff*.25;previewBox.scrollTop=previewPos;
}
const WS=0.6;
function scrubPx(dpx){
  const max=Math.max(0,previewText.scrollHeight-previewBox.clientHeight);if(!max)return;
  previewPos=Math.max(0,Math.min(previewPos+dpx,max));previewBox.scrollTop=previewPos;
  scrollPct=previewPos/max;sendUpdate('seek',scrollPct);renderHighlight();updateScrubber();
  if(uiMode==='editor'){const{startChar}=getHighlightRange();const total=state.text.length||1;textArea.scrollTop=(startChar/total)*textArea.scrollHeight;highlightLayer.scrollTop=textArea.scrollTop;}
  else highlightDirector();
  updateEditorScroll();
}
let prevDragY=0;
previewBox.addEventListener('pointerdown',e=>{draggingPreview=true;prevDragY=e.clientY;previewBox.setPointerCapture(e.pointerId);previewBox.classList.add('dragging');});
previewBox.addEventListener('pointermove',e=>{if(!draggingPreview)return;scrubPx(-(e.clientY-prevDragY));prevDragY=e.clientY;});
const endPD=()=>{draggingPreview=false;previewBox.classList.remove('dragging');};
previewBox.addEventListener('pointerup',endPD);previewBox.addEventListener('pointercancel',endPD);
previewBox.addEventListener('wheel',e=>{e.preventDefault();scrubPx(e.deltaY*WS);},{passive:false});

// ── DOM-BASED HIGHLIGHT ───────────────────────────────────
function getTextNode(){const n=previewText.firstChild;return(n&&n.nodeType===Node.TEXT_NODE&&n.length)?n:null;}
function caretAt(x,y,tn){
  if(document.caretRangeFromPoint){const r=document.caretRangeFromPoint(x,y);if(r){if(r.startContainer===tn)return r.startOffset;if(r.startContainer===previewText)return r.startOffset===0?0:tn.length;}}
  else if(document.caretPositionFromPoint){const p=document.caretPositionFromPoint(x,y);if(p){if(p.offsetNode===tn)return p.offset;if(p.offsetNode===previewText)return p.offset===0?0:tn.length;}}
  return null;
}
function getHighlightRange(){
  const text=state.text,tn=getTextNode();
  if(!tn||!text.length)return{startChar:0,endChar:0};
  const rect=previewBox.getBoundingClientRect();
  if(!rect.width||!rect.height)return{startChar:0,endChar:0};
  const x=rect.left+2;let s=caretAt(x,rect.top+1,tn),e=caretAt(x,rect.bottom-1,tn);
  if(s===null)s=0;if(e===null)e=text.length;if(e<s){const t=s;s=e;e=t;}
  while(s>0&&/\S/.test(text[s-1])&&/\S/.test(text[s]))s--;
  while(e<text.length&&e>0&&/\S/.test(text[e-1])&&/\S/.test(text[e]))e++;
  return{startChar:s,endChar:e};
}
function scrollPctFromChar(ci){
  const tn=getTextNode(),max=Math.max(0,previewText.scrollHeight-previewBox.clientHeight);
  if(!tn||!max)return 0;ci=Math.max(0,Math.min(ci,tn.length));
  const range=document.createRange();
  if(ci>=tn.length){range.setStart(tn,Math.max(0,tn.length-1));range.setEnd(tn,tn.length);}
  else{range.setStart(tn,ci);range.setEnd(tn,ci+1);}
  const rects=range.getClientRects();if(!rects.length)return scrollPct;
  const br=previewBox.getBoundingClientRect();
  return Math.max(0,Math.min(1,((rects[0].top-br.top)+previewBox.scrollTop)/max));
}
function renderHighlight(){
  if(uiMode==='director'){highlightDirector();return;}
  const text=state.text,{startChar,endChar}=getHighlightRange();
  highlightLayer.innerHTML=escHtml(text.slice(0,startChar))+(startChar<endChar?'<span class="highlight-span">'+escHtml(text.slice(startChar,endChar))+'</span>':'')+escHtml(text.slice(endChar));
  highlightLayer.scrollTop=textArea.scrollTop;
}
textArea.addEventListener('scroll',()=>{highlightLayer.scrollTop=textArea.scrollTop;updateEditorScroll();});
textArea.addEventListener('wheel',e=>{e.preventDefault();scrubPx(e.deltaY*WS);},{passive:false});
directorView.addEventListener('wheel',e=>{e.preventDefault();scrubPx(e.deltaY*WS);},{passive:false});

// ── LEFT EDITOR SCROLLBAR (navigates editor without affecting prompter) ─
function editorScrollEl(){return uiMode==='director'?directorView:textArea;}
function updateEditorScroll(){
  const el=editorScrollEl();
  const h=editorScrollbar.clientHeight;
  const viewH=el.clientHeight, contentH=el.scrollHeight;
  if(contentH<=viewH){editorScrollThumb.style.display='none';return;}
  editorScrollThumb.style.display='';
  const thumbH=Math.max(20,(viewH/contentH)*h);
  const thumbTop=(el.scrollTop/(contentH-viewH))*(h-thumbH);
  editorScrollThumb.style.height=thumbH+'px';
  editorScrollThumb.style.top=Math.max(0,thumbTop)+'px';
}
function editorScrollToRatio(ratio){
  const el=editorScrollEl();
  el.scrollTop=ratio*(el.scrollHeight-el.clientHeight);
  if(uiMode==='editor')highlightLayer.scrollTop=el.scrollTop;
  updateEditorScroll();
}
let draggingES=false, esDragOff=0;
editorScrollThumb.addEventListener('pointerdown',e=>{
  e.preventDefault();e.stopPropagation();
  draggingES=true;
  esDragOff=e.clientY-editorScrollbar.getBoundingClientRect().top-(parseFloat(editorScrollThumb.style.top)||0);
  editorScrollThumb.setPointerCapture(e.pointerId);
});
editorScrollThumb.addEventListener('pointermove',e=>{
  if(!draggingES)return;
  const h=editorScrollbar.clientHeight;
  const thumbH=parseFloat(editorScrollThumb.style.height)||20;
  const newTop=Math.max(0,Math.min(e.clientY-editorScrollbar.getBoundingClientRect().top-esDragOff,h-thumbH));
  editorScrollToRatio(newTop/(h-thumbH));
});
editorScrollThumb.addEventListener('pointerup',()=>{draggingES=false;});
editorScrollThumb.addEventListener('pointercancel',()=>{draggingES=false;});
editorScrollbar.addEventListener('pointerdown',e=>{
  if(e.target===editorScrollThumb)return;
  const h=editorScrollbar.clientHeight;
  const thumbH=parseFloat(editorScrollThumb.style.height)||20;
  const ratio=Math.max(0,Math.min((e.clientY-editorScrollbar.getBoundingClientRect().top-thumbH/2)/(h-thumbH),1));
  editorScrollToRatio(ratio);
});
// No wheel on left scrollbar — wheel goes to textarea/directorView which scrubs prompter

// ── SCRUBBER ──────────────────────────────────────────────
function thumbGeo(){
  const h=scrubberTrack.clientHeight,total=state.text.length||1;
  const{startChar,endChar}=getHighlightRange();
  let top=(startChar/total)*h,size=Math.max(24,((endChar-startChar)/total)*h);
  if(top+size>h)top=h-size;if(top<0)top=0;return{h,size,top};
}
function updateScrubber(){const{size,top}=thumbGeo();scrubberThumb.style.height=size+'px';scrubberThumb.style.top=top+'px';}
function seekThumb(tt){
  const{h,size}=thumbGeo();tt=Math.max(0,Math.min(tt,h-size));
  const cf=h>0?tt/h:0;const pct=scrollPctFromChar(Math.round(cf*(state.text.length||1)));
  scrollPct=pct;sendUpdate('seek',pct);correctPreview(pct);renderHighlight();updateScrubber();
  if(uiMode==='editor'){textArea.scrollTop=cf*textArea.scrollHeight;highlightLayer.scrollTop=textArea.scrollTop;}
  else highlightDirector();
}
scrubberThumb.addEventListener('pointerdown',e=>{e.preventDefault();draggingScrubber=true;const{top}=thumbGeo();dragScrubOff=e.clientY-scrubberTrack.getBoundingClientRect().top-top;scrubberThumb.setPointerCapture(e.pointerId);});
scrubberThumb.addEventListener('pointermove',e=>{if(!draggingScrubber)return;seekThumb(e.clientY-scrubberTrack.getBoundingClientRect().top-dragScrubOff);});
scrubberThumb.addEventListener('pointerup',()=>{draggingScrubber=false;});
scrubberThumb.addEventListener('pointercancel',()=>{draggingScrubber=false;});
scrubberTrack.addEventListener('pointerdown',e=>{if(e.target===scrubberThumb)return;const{size}=thumbGeo();seekThumb(e.clientY-scrubberTrack.getBoundingClientRect().top-size/2);});
scrubberTrack.addEventListener('wheel',e=>{e.preventDefault();scrubPx(e.deltaY*WS);},{passive:false});

// ── OUTGOING ──────────────────────────────────────────────
function sendUpdate(f,v){if(conn&&conn.open)conn.send({type:'update',field:f,value:v});}
playBtn.onclick=()=>{
  const v=state.playState==='playing'?'paused':'playing';
  state.playState=v;
  playBtn.textContent=v==='playing'?'Pause':'Play';
  playBtn.classList.toggle('active',v==='playing');
  sendUpdate('playState',v);
};
resetBtn.onclick=()=>{sendUpdate('reset',true);scrollPct=0;previewPos=0;previewBox.scrollTop=0;sentenceIdx=0;renderHighlight();updateScrubber();};
mirrorHBtn.onclick=()=>sendUpdate('mirroredH',!state.mirroredH);
mirrorVBtn.onclick=()=>sendUpdate('mirroredV',!state.mirroredV);
fontFamilySelect.onchange=()=>sendUpdate('fontFamily',fontFamilySelect.value);
const sf=d=>{const v=Math.max(20,Math.min(200,+fontSizeSlider.value+d));fontSizeSlider.value=v;fontSizeValue.textContent=v+'px';sendUpdate('fontSize',v);};
const ss=d=>{const v=Math.max(0,Math.min(400,+speedSlider.value+d));speedSlider.value=v;speedValue.textContent=v;sendUpdate('scrollSpeed',v);};
fontIncBtn.onclick=()=>sf(2);fontDecBtn.onclick=()=>sf(-2);
speedIncBtn.onclick=()=>ss(5);speedDecBtn.onclick=()=>ss(-5);
fontSizeSlider.oninput=()=>{fontSizeValue.textContent=fontSizeSlider.value+'px';sendUpdate('fontSize',+fontSizeSlider.value);};
speedSlider.oninput=()=>{speedValue.textContent=speedSlider.value;sendUpdate('scrollSpeed',+speedSlider.value);};
textArea.oninput=()=>{
  const v=textArea.value;setTimeout(()=>sendUpdate('text',v),250);
  getActiveScript().text=v;sentenceStarts=buildSentenceStarts(v);renderHighlight();autosave();
  requestAnimationFrame(updateEditorScroll);
};
undoBtn.onclick=()=>{textArea.focus();document.execCommand('undo');};
redoBtn.onclick=()=>{textArea.focus();document.execCommand('redo');};
copyBtn.onclick=async()=>{try{await navigator.clipboard.writeText(state.text);const o=copyBtn.textContent;copyBtn.textContent='Copied';setTimeout(()=>{copyBtn.textContent=o;},1200);}catch(e){copyBtn.textContent='Failed';setTimeout(()=>{copyBtn.textContent='Copy';},1200);}};
exportBtn.onclick=exportWithNotes;

// ── KEYBOARD ──────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  const inAnyInput=['INPUT','TEXTAREA'].includes(document.activeElement.tagName);
  const inEditor=document.activeElement===textArea;
  if((e.code==='Space'||e.key===' ')&&!inAnyInput){e.preventDefault();
    const v=state.playState==='playing'?'paused':'playing';
    state.playState=v;playBtn.textContent=v==='playing'?'Pause':'Play';
    playBtn.classList.toggle('active',v==='playing');sendUpdate('playState',v);return;}
  if(!inEditor&&(e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key==='z'){textArea.focus();document.execCommand('redo');textArea.blur();return;}
  if((e.key==='ArrowUp'||e.key==='ArrowDown')&&!inAnyInput){e.preventDefault();jumpToSentence(e.key==='ArrowDown'?sentenceIdx+1:sentenceIdx-1);}
});

// ── INCOMING ──────────────────────────────────────────────
function handleData(msg){
  if(msg.type==='state'){state={...state,...msg.data,text:state.text};sentenceStarts=buildSentenceStarts(state.text);renderControls();}
  else if(msg.type==='scroll'){scrollPct=msg.position;if(!draggingPreview)correctPreview(scrollPct);renderHighlight();updateScrubber();}
  else if(msg.type==='viewport'){phone={w:msg.width,h:msg.height};updateMonitorScale();}
}
window.addEventListener('resize',()=>{updateMonitorScale();updateScrubber();updateEditorScroll();});

// ── QR MODAL ──────────────────────────────────────────────
function buildPrompterUrl(c){const dir=window.location.pathname.replace(/\/[^/]*$/,'/');return window.location.origin+dir+'prompter.html?code='+c;}
function openQrModal(){
  qrModalCanvas.innerHTML='';
  try{new QRCode(qrModalCanvas,{text:buildPrompterUrl(peerCode),width:180,height:180,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});}catch(e){}
  qrModalCode.textContent=peerCode;qrModal.style.display='flex';
}
persistentCode.onclick=openQrModal;
closeQrModal.onclick=()=>{qrModal.style.display='none';};
qrModal.addEventListener('pointerdown',e=>{if(e.target===qrModal)qrModal.style.display='none';});
dismissBanner.onclick=()=>reconnectBanner.classList.remove('visible');

// ── ENTER MAIN PANEL ──────────────────────────────────────
function enterMainPanel(){
  openingPanel.classList.add('hidden');
  document.body.insertBefore(tabBar,mainPanel);
  tabBar.classList.add('visible');mainPanel.classList.add('visible');
  persistentCode.textContent=peerCode;
  renderTabs();syncScript();textArea.value=state.text;
  sentenceStarts=buildSentenceStarts(state.text);
  updateMonitorScale();updateScrubber();checkRestore();
  // Send current script to prompter now that the session is chosen
  if(conn&&conn.open){
    const payload={type:'state',data:{...state,text:getActiveScript().text}};
    conn.send(payload);
    setTimeout(()=>{if(conn&&conn.open)conn.send(payload);},400);
  }
}
function renderQr(c){
  qrCanvas.innerHTML='';
  try{new QRCode(qrCanvas,{text:buildPrompterUrl(c),width:180,height:180,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});}catch(e){}
}
function applyCode(c){
  peerCode=c;
  hostCode.textContent=c;
  bannerCode.textContent=c;
  persistentCode.textContent=c;
  renderQr(c);
}
function setPeerStatus(ready){
  const dot=document.getElementById('peerStatus');
  if(dot){dot.style.color=ready?'var(--accent)':'var(--muted)';dot.title=ready?'Signaling server: connected':'Signaling server: connecting…';}
}

newProjectBtn.onclick=()=>{session=defaultSession(true);enterMainPanel();};
loadProjectBtn.onclick=()=>fileInput.click();

// ── PEER — exact v4 structure ─────────────────────────────
function startHost(){
  peer=new Peer('tp-'+peerCode);
  connectionStatus.textContent='Waiting for prompter…';
  peer.on('open',()=>{
    applyCode(peerCode);
    setPeerStatus(true);
    connectionStatus.textContent='Waiting for prompter…';
  });
  peer.on('connection',c=>{
    conn=c;
    conn.on('open',()=>{
      sideStatus.textContent='CONNECTED';
      reconnectBanner.classList.remove('visible');
      connectionStatus.textContent='Prompter connected — choose a session below';
      syncScript();
      const payload={type:'state',data:{...state,text:getActiveScript().text}};
      conn.send(payload);
      setTimeout(()=>{if(conn&&conn.open)conn.send(payload);},400);
    });
    conn.on('data',handleData);
    conn.on('close',()=>{
      conn=null;
      sideStatus.textContent='DISCONNECTED';
      reconnectBanner.classList.add('visible');
      connectionStatus.textContent='Waiting for prompter…';
    });
  });
  peer.on('error',err=>{
    setPeerStatus(false);
    if(err.type==='unavailable-id'){
      peerCode=generateCode();
      persistentCode.textContent=peerCode;
      peer.destroy();startHost();
    }else{
      connectionStatus.textContent='Error: '+err.type;
      console.warn('PeerJS error:',err.type);
    }
  });
}
newCodeBtn.onclick=()=>{if(peer)peer.destroy();conn=null;peerCode=generateCode();connectionStatus.textContent='Generating…';setPeerStatus(false);startHost();};
startHost();

// Watch for new connections when main panel is up (v4 reconnect pattern)
setInterval(()=>{
  if(peer&&!conn&&!peer.destroyed){
    peer.on('connection',c=>{
      conn=c;
      conn.on('open',()=>{
        sideStatus.textContent='CONNECTED';
        reconnectBanner.classList.remove('visible');
        syncScript();
        const payload={type:'state',data:{...state,text:getActiveScript().text}};
        conn.send(payload);
        setTimeout(()=>{if(conn&&conn.open)conn.send(payload);},400);
      });
      conn.on('data',handleData);
      conn.on('close',()=>{conn=null;sideStatus.textContent='DISCONNECTED';reconnectBanner.classList.add('visible');});
    });
  }
},2000);
</script>
