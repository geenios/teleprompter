<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Teleprompter</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --text-color: #ffffff;
    --accent: #ffc800;
    --panel-bg: rgba(18,18,18,0.94);
    --border: #2a2a2a;
    --muted: #8a8a8a;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height:100%; width:100%; overflow:hidden; background:var(--bg);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    user-select:none; -webkit-user-select:none;
  }

  #prompter { position:relative; height:100vh; width:100vw; overflow:hidden; background:var(--bg); }

  #scrollArea {
    position:absolute; inset:0; overflow-y:auto; -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  #scrollArea::-webkit-scrollbar { display:none; }

  #textContent {
    color: var(--text-color);
    padding: 60vh 6vw 60vh 6vw;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
    transform-origin: center;
  }

  /* Connect overlay */
  #connectOverlay {
    position:absolute; inset:0; z-index:30;
    display:flex; align-items:center; justify-content:center;
    background: rgba(0,0,0,0.85); padding:24px;
    transition: opacity 0.2s ease, visibility 0.2s ease;
  }
  #connectOverlay.hidden { opacity:0; visibility:hidden; pointer-events:none; }
  .connect-card {
    background: var(--panel-bg); border:1px solid var(--border); border-radius:12px;
    padding: 28px 24px; width:100%; max-width:340px; text-align:center;
    color: var(--text-color); display:flex; flex-direction:column; gap:14px;
  }
  .connect-card h2 { font-size:16px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; color:var(--muted); }
  .connect-card p { color: var(--muted); font-size:13px; line-height:1.5; }
  #codeInput {
    font-family: "SF Mono", "Courier New", monospace; font-size: 32px; letter-spacing: 0.25em;
    text-align:center; background:#000; border:2px solid var(--border); color: var(--accent);
    border-radius:8px; padding: 12px; outline:none; width:100%;
  }
  #codeInput:focus { border-color: var(--accent); }
  .overlay-btn {
    background: var(--accent); color:#000; border:none; padding:12px 20px;
    border-radius:8px; font-size:15px; font-weight:600;
  }
  .overlay-btn.secondary { background:none; border:1px solid var(--border); color: var(--text-color); font-weight:400; }
  #connectStatus { color: var(--muted); font-size:13px; min-height:16px; }
  .hidden { display:none; }

  /* Controls */
  #controls {
    position:absolute; bottom:0; left:0; width:100%; z-index:10;
    background: var(--panel-bg); border-top: 1px solid var(--border);
    display:flex; align-items:center; gap: 8px; padding: 10px 12px;
    flex-wrap: wrap; justify-content:center;
    transform: translateY(0); transition: transform 0.25s ease;
  }
  #controls.collapsed { transform: translateY(100%); }

  .ctrl-btn {
    background: #1a1a1a; color: var(--text-color); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; font-size: 15px; min-width:44px; min-height:44px;
    display:flex; align-items:center; justify-content:center; gap:4px;
  }
  .ctrl-btn.active { border-color: var(--accent); color: var(--accent); }
  .ctrl-group { display:flex; align-items:center; gap:4px; }
  .ctrl-value {
    font-family: "SF Mono", "Courier New", monospace; color: var(--muted); font-size: 13px;
    min-width: 38px; text-align:center;
  }

  #statusBadge {
    display:flex; align-items:center; gap:6px; padding: 10px 12px; border-radius:8px;
    border: 1px solid var(--border); color: var(--muted); font-size: 13px;
    font-family: "SF Mono", "Courier New", monospace;
  }
  #statusDot { width:8px; height:8px; border-radius:50%; background:#555; flex-shrink:0; }
  #statusDot.connected { background: var(--accent); }

  #toggleControls {
    position:absolute; bottom:14px; right:14px; z-index:11;
    background: var(--panel-bg); border:1px solid var(--border); color:var(--text-color);
    border-radius:50%; width:44px; height:44px; font-size:18px;
  }
</style>
</head>
<body>
  <div id="prompter">
    <div id="scrollArea">
      <div id="textContent"></div>
    </div>

    <div id="connectOverlay">
      <div class="connect-card">
        <div id="connectFormSection">
          <h2>Connect to control</h2>
          <p>Enter the code shown on the control page to link this prompter for live editing and remote settings.</p>
          <input type="text" id="codeInput" maxlength="6" inputmode="numeric" placeholder="------">
          <button class="overlay-btn" id="connectBtn">Connect</button>
          <div id="connectStatus"></div>
        </div>
        <div id="connectedSection" class="hidden">
          <h2>Connected</h2>
          <p>This prompter is linked to the control page.</p>
          <button class="overlay-btn" id="disconnectBtn">Disconnect</button>
        </div>
        <button class="overlay-btn secondary" id="closeOverlayBtn">Use offline</button>
      </div>
    </div>

    <div id="controls">
      <div id="statusBadge"><span id="statusDot"></span><span id="statusText">OFFLINE</span></div>
      <button class="ctrl-btn" id="playBtn">Play</button>
      <button class="ctrl-btn" id="resetBtn">Restart</button>
      <button class="ctrl-btn" id="mirrorHBtn" title="Mirror horizontal">↔</button>
      <button class="ctrl-btn" id="mirrorVBtn" title="Mirror vertical">↕</button>
      <div class="ctrl-group">
        <button class="ctrl-btn" id="fontDecBtn">A-</button>
        <span class="ctrl-value" id="fontSizeDisplay">48px</span>
        <button class="ctrl-btn" id="fontIncBtn">A+</button>
      </div>
      <div class="ctrl-group">
        <button class="ctrl-btn" id="speedDecBtn">Sp-</button>
        <span class="ctrl-value" id="speedDisplay">50</span>
        <button class="ctrl-btn" id="speedIncBtn">Sp+</button>
      </div>
    </div>
    <button id="toggleControls">▾</button>
  </div>

<script>
  const scrollArea = document.getElementById('scrollArea');
  const textContent = document.getElementById('textContent');
  const connectOverlay = document.getElementById('connectOverlay');
  const connectFormSection = document.getElementById('connectFormSection');
  const connectedSection = document.getElementById('connectedSection');
  const codeInput = document.getElementById('codeInput');
  const connectBtn = document.getElementById('connectBtn');
  const connectStatus = document.getElementById('connectStatus');
  const disconnectBtn = document.getElementById('disconnectBtn');
  const closeOverlayBtn = document.getElementById('closeOverlayBtn');
  const controls = document.getElementById('controls');
  const toggleControlsBtn = document.getElementById('toggleControls');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const statusBadge = document.getElementById('statusBadge');
  const playBtn = document.getElementById('playBtn');
  const resetBtn = document.getElementById('resetBtn');
  const mirrorHBtn = document.getElementById('mirrorHBtn');
  const mirrorVBtn = document.getElementById('mirrorVBtn');
  const fontDecBtn = document.getElementById('fontDecBtn');
  const fontIncBtn = document.getElementById('fontIncBtn');
  const fontSizeDisplay = document.getElementById('fontSizeDisplay');
  const speedDecBtn = document.getElementById('speedDecBtn');
  const speedIncBtn = document.getElementById('speedIncBtn');
  const speedDisplay = document.getElementById('speedDisplay');

  // Font choices well suited to on-screen reading at speed
  const FONTS = {
    verdana:   { label: 'Verdana',               stack: 'Verdana, Geneva, sans-serif' },
    opensans:  { label: 'Open Sans',             stack: "'Open Sans', sans-serif" },
    atkinson:  { label: 'Atkinson Hyperlegible', stack: "'Atkinson Hyperlegible', sans-serif" },
    mono:      { label: 'Monospace',             stack: "'Courier New', monospace" }
  };

  let state = {
    text: "Welcome to your teleprompter.\n\nTo connect, open the control page on your computer and enter the six-digit code shown there into this app.\n\nOnce connected, you can edit this script live from the control page, and adjust every setting from there too: font size, scroll speed, and mirroring.\n\nUse the buttons below to play or pause scrolling, restart from the top, and mirror the image horizontally or vertically.\n\nOn the control page, drag the scrubber bar on the right of the script, or drag the live preview itself, to jump to any part of the script. You can also export this script as a markdown file from there.\n\nTap Play to begin scrolling.",
    fontSize: 48,
    fontFamily: 'opensans',
    scrollSpeed: 50, // pixels per second
    mirroredH: false,
    mirroredV: false,
    playState: 'paused'
  };

  let conn = null;
  let peer = null;

  // ---- Rendering ----
  function render() {
    textContent.textContent = state.text;
    textContent.style.fontSize = state.fontSize + 'px';
    textContent.style.fontFamily = (FONTS[state.fontFamily] || FONTS.opensans).stack;
    const sx = state.mirroredH ? -1 : 1;
    const sy = state.mirroredV ? -1 : 1;
    textContent.style.transform = `scale(${sx}, ${sy})`;
    playBtn.textContent = state.playState === 'playing' ? 'Pause' : 'Play';
    playBtn.classList.toggle('active', state.playState === 'playing');
    mirrorHBtn.classList.toggle('active', state.mirroredH);
    mirrorVBtn.classList.toggle('active', state.mirroredV);
    fontSizeDisplay.textContent = state.fontSize + 'px';
    speedDisplay.textContent = state.scrollSpeed;
  }

  function broadcastState() {
    if (conn && conn.open) {
      conn.send({ type: 'state', data: state });
    }
  }

  function sendViewport() {
    if (conn && conn.open) {
      conn.send({ type: 'viewport', width: window.innerWidth, height: window.innerHeight });
    }
  }
  window.addEventListener('resize', sendViewport);

  // ---- Scroll position tracking ----
  // scrollArea.scrollTop only stores whole pixels, which breaks slow continuous
  // scrolling (a fraction-of-a-pixel increment per frame gets rounded away).
  // Track position as a float ourselves and only resync from the DOM on manual scroll.
  let scrollPosition = scrollArea.scrollTop;
  let programmaticScroll = false;

  scrollArea.addEventListener('scroll', () => {
    if (!programmaticScroll) {
      scrollPosition = scrollArea.scrollTop;
    }
  });

  function setScroll(px) {
    const max = Math.max(0, scrollArea.scrollHeight - scrollArea.clientHeight);
    scrollPosition = Math.max(0, Math.min(px, max));
    programmaticScroll = true;
    scrollArea.scrollTop = scrollPosition;
    programmaticScroll = false;
  }

  // Update state while preserving relative scroll position (handles live text edits)
  function updateState(partial) {
    const max = scrollArea.scrollHeight - scrollArea.clientHeight;
    const pct = max > 0 ? scrollPosition / max : 0;
    state = { ...state, ...partial };
    render();
    requestAnimationFrame(() => {
      const newMax = scrollArea.scrollHeight - scrollArea.clientHeight;
      setScroll(pct * newMax);
    });
    broadcastState();
  }

  render();

  // ---- Auto-scroll loop ----
  let lastTime = null;
  function tick(timestamp) {
    if (state.playState === 'playing') {
      if (lastTime !== null) {
        const dt = (timestamp - lastTime) / 1000;
        setScroll(scrollPosition + state.scrollSpeed * dt);
      }
      lastTime = timestamp;
    } else {
      lastTime = null;
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // Broadcast scroll position periodically for the live preview
  setInterval(() => {
    if (conn && conn.open) {
      const max = scrollArea.scrollHeight - scrollArea.clientHeight;
      const pct = max > 0 ? Math.min(1, Math.max(0, scrollPosition / max)) : 0;
      conn.send({ type: 'scroll', position: pct });
    }
  }, 150);

  // ---- Local controls ----
  playBtn.onclick = () => updateState({ playState: state.playState === 'playing' ? 'paused' : 'playing' });
  resetBtn.onclick = () => setScroll(0);
  mirrorHBtn.onclick = () => updateState({ mirroredH: !state.mirroredH });
  mirrorVBtn.onclick = () => updateState({ mirroredV: !state.mirroredV });
  fontIncBtn.onclick = () => updateState({ fontSize: Math.min(200, state.fontSize + 4) });
  fontDecBtn.onclick = () => updateState({ fontSize: Math.max(20, state.fontSize - 4) });
  speedIncBtn.onclick = () => updateState({ scrollSpeed: Math.min(400, state.scrollSpeed + 10) });
  speedDecBtn.onclick = () => updateState({ scrollSpeed: Math.max(0, state.scrollSpeed - 10) });

  toggleControlsBtn.onclick = () => {
    controls.classList.toggle('collapsed');
    toggleControlsBtn.textContent = controls.classList.contains('collapsed') ? '▴' : '▾';
  };

  // ---- Remote messages ----
  function handleRemoteMessage(msg) {
    if (msg.type === 'update') {
      if (msg.field === 'reset') {
        setScroll(0);
        return;
      }
      if (msg.field === 'seek') {
        const max = scrollArea.scrollHeight - scrollArea.clientHeight;
        setScroll(msg.value * Math.max(0, max));
        return;
      }
      updateState({ [msg.field]: msg.value });
    }
  }

  // ---- Connection (this prompter is the client; control page hosts the session) ----
  codeInput.addEventListener('input', () => {
    codeInput.value = codeInput.value.replace(/\D/g, '').slice(0, 6);
  });
  codeInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') connectBtn.click();
  });

  function setStatus(text, connected) {
    statusText.textContent = text;
    statusDot.classList.toggle('connected', !!connected);
  }

  function openOverlay() {
    const isConnected = conn && conn.open;
    connectFormSection.classList.toggle('hidden', isConnected);
    connectedSection.classList.toggle('hidden', !isConnected);
    connectOverlay.classList.remove('hidden');
  }
  statusBadge.onclick = openOverlay;
  closeOverlayBtn.onclick = () => connectOverlay.classList.add('hidden');

  disconnectBtn.onclick = () => {
    if (conn) conn.close();
    conn = null;
    setStatus('OFFLINE', false);
    connectOverlay.classList.add('hidden');
  };

  connectBtn.onclick = () => {
    const code = codeInput.value.trim();
    if (!/^\d{6}$/.test(code)) {
      connectStatus.textContent = 'Enter the 6-digit code shown on the control page.';
      return;
    }
    connectStatus.textContent = 'Connecting...';
    connectBtn.disabled = true;
    setStatus('CONNECTING', false);

    if (!peer) {
      peer = new Peer();
    }

    const tryConnect = () => {
      conn = peer.connect('tp-' + code, { reliable: true });
      conn.on('open', () => {
        connectBtn.disabled = false;
        setStatus('CONNECTED', true);
        connectOverlay.classList.add('hidden');
        broadcastState();
        sendViewport();
      });
      conn.on('data', handleRemoteMessage);
      conn.on('close', () => {
        conn = null;
        setStatus('OFFLINE', false);
      });
      conn.on('error', () => {
        connectBtn.disabled = false;
        connectStatus.textContent = 'Connection error. Check the code and try again.';
        setStatus('OFFLINE', false);
      });
    };

    if (peer.open) {
      tryConnect();
    } else {
      peer.on('open', tryConnect);
      peer.on('error', err => {
        connectBtn.disabled = false;
        connectStatus.textContent = 'Error: ' + err.type;
        setStatus('OFFLINE', false);
      });
    }
  };

  // ---- Auto-connect if ?code= is in the URL (e.g. opened via QR code) ----
  (function autoConnect() {
    const params = new URLSearchParams(window.location.search);
    const urlCode = params.get('code');
    if (urlCode && /^\d{6}$/.test(urlCode)) {
      codeInput.value = urlCode;
      // Small delay so PeerJS has time to initialise before we call connect
      setTimeout(() => connectBtn.click(), 600);
    } else {
      connectOverlay.classList.remove('hidden');
    }
  })();
  let wakeLock = null;
  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
      }
    } catch (e) { /* ignore if unsupported or denied */ }
  }
  requestWakeLock();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });
</script>
</body>
</html>
